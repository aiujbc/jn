<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재난안전 포털 - 의정부시</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #0a1628;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      background: linear-gradient(135deg, #0a1628 0%, #0e2040 50%, #0a1628 100%);
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      position: relative;
      overflow: hidden;
    }

    /* 배경 그리드 */
    .bg-grid {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0.05;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(79,195,247,0.8) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,195,247,0.8) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* 경보 아이콘 */
    .icon-wrap {
      position: relative;
      margin-bottom: 1.2rem;
    }
    .pulse-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 86px; height: 86px;
      border-radius: 50%;
      border: 2px solid #ef5350;
      animation: pulse-ring 2s ease-out infinite;
      pointer-events: none;
    }
    .icon-circle {
      width: 68px; height: 68px;
      background: #ef5350;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      animation: float 3s ease-in-out infinite;
    }

    /* 타이틀 */
    .sub-label {
      color: #ef9a9a;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 0.3rem;
    }
    .enter-text {
      color: #90caf9;
      font-size: 16px;
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: #90caf9;
      border-radius: 50%;
    }
    .dot:nth-child(1) { animation: blink 1.4s ease-in-out infinite; }
    .dot:nth-child(2) { animation: blink 1.4s ease-in-out 0.2s infinite; }
    .dot:nth-child(3) { animation: blink 1.4s ease-in-out 0.4s infinite; }

    /* 메뉴 카드 그리드 */
    .menu-grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 620px;
    }

    .menu-card {
      background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      flex: 1;
      min-width: 220px;
    }
    .menu-card:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.28);
      transform: translateY(-3px);
    }
    .menu-card:active { transform: scale(0.97); }

    .card-icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-icon.blue {
      background: rgba(79,195,247,0.15);
      border: 0.5px solid rgba(79,195,247,0.35);
    }
    .card-icon.green {
      background: rgba(129,199,132,0.15);
      border: 0.5px solid rgba(129,199,132,0.35);
    }

    .card-body { text-align: center; }
    .card-tag {
      font-size: 11px;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .card-tag.blue { color: #4fc3f7; }
    .card-tag.green { color: #81c784; }

    .card-title {
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      line-height: 1.5;
    }

    .card-btn {
      border-radius: 20px;
      padding: 5px 16px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 4px;
    }
    .card-btn.blue {
      background: rgba(79,195,247,0.18);
      border: 0.5px solid rgba(79,195,247,0.35);
      color: #4fc3f7;
    }
    .card-btn.green {
      background: rgba(129,199,132,0.18);
      border: 0.5px solid rgba(129,199,132,0.35);
      color: #81c784;
    }

    .footer-text {
      color: rgba(144,202,249,0.45);
      font-size: 11px;
      margin-top: 2.5rem;
      text-align: center;
    }

    /* 애니메이션 */
    @keyframes pulse-ring {
      0%   { transform: translate(-50%,-50%) scale(0.85); opacity: 0.7; }
      100% { transform: translate(-50%,-50%) scale(1.5);  opacity: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* 반응형 */
    @media (max-width: 500px) {
      h1 { font-size: 22px; }
      .menu-card { padding: 1.5rem 1.2rem; min-width: 160px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="bg-grid"></div>

    <!-- 경보 아이콘 -->
    <div class="icon-wrap">
      <div class="pulse-ring"></div>
      <div class="icon-circle">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none"
             stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
    </div>

    <!-- 타이틀 -->
    <p class="sub-label">의정부시</p>
    <h1>재난안전 포털</h1>
    <div class="enter-text">
      입장하기
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <!-- 메뉴 카드 -->
    <div class="menu-grid">

      <!-- 메뉴 1 -->
      <a href="https://aiujbc.github.io/jn/ai/" target="_blank" class="menu-card">
        <div class="card-icon blue">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
               stroke="#4fc3f7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <path d="M8 21h8M12 17v4"/>
            <circle cx="12" cy="10" r="3"/>
            <path d="M12 7v-.5M12 13.5V13M8.5 10H9M15 10h.5
                     M9.76 7.76l-.35-.35M14.59 12.59l-.35-.35
                     M9.76 12.24l-.35.35M14.59 7.41l-.35.35"/>
          </svg>
        </div>
        <div class="card-body">
          <p class="card-tag blue">AI 재난안전</p>
          <p class="card-title">의정부시 AI<br>재난안전 상황실</p>
        </div>
        <div class="card-btn blue">
          입장하기
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
               stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </div>
      </a>

      <!-- 메뉴 2 -->
      <a href="https://aiujbc.github.io/jn/ai02" target="_blank" class="menu-card">
        <div class="card-icon green">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
               stroke="#81c784" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <path d="M9 12l2 2 4-4"/>
          </svg>
        </div>
        <div class="card-body">
          <p class="card-tag green">스마트 안전</p>
          <p class="card-title">의정부시 AI<br>재난안전 상황실</p>
        </div>
        <div class="card-btn green">
          입장하기
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
               stroke="#81c784" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </div>
      </a>

    </div>

    <p class="footer-text">의정부시 디지털정부 서비스</p>
  </div>
</body>
</html>
