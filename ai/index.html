  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #08142b;
      font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
    }

    /*
      핵심 변경사항
      - 기존 background-image 방식 삭제
      - 실제 <img> 태그를 배치하고 그 위에 링크 영역을 absolute로 올림
      - 이미지와 링크 영역이 같은 비율로 확대·축소되어 위치 어긋남을 최소화
    */
    .main-page {
      position: relative;
      width: min(1536px, 100%);
      line-height: 0;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
      background: #08142b;
    }

    .main-image {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    .link-area {
      position: absolute;
      display: block;
      border-radius: 16px;
      text-decoration: none;
      outline: none;
      line-height: normal;
      transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .link-area:hover,
    .link-area:focus-visible {
      background: transparent;
      box-shadow: none;
      transform: none;
    }

    .link-area span {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /*
      위치 조정이 필요할 때 아래 임시 표시 코드를 주석 해제하세요.

      조정 완료 후 다시 주석 처리하면 됩니다.

      .link-area {
        background: rgba(255, 0, 0, 0.18);
        border: 2px solid red;
      }
    */
